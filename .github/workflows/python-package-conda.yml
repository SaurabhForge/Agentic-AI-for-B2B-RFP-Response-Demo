- name: Test with pytest
  run: |
    conda install pytest
    pytest || retval=$?
    if [ "${retval:-0}" -eq 5 ]; then
      echo "Pytest collected no tests (exit code 5). Continuing without failing the workflow."
      exit 0
    else
      # If pytest failed for another reason, return the original exit code so the job still fails.
      exit ${retval:-0}
    fi
